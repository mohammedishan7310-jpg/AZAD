<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admissions — Azad Sr. Sec. School</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ['"IBM Plex Sans"','sans-serif'], display: ['"Cabinet Grotesk"','sans-serif'] }, colors: { ink:'#0F172A', ink2:'#1E293B', ash:'#475569', cream:'#FDFBF7', saffron:'#EA580C', saffronDark:'#C2410C' } } } }
    </script>
    <style>
      html { overflow-x: hidden; } body { overflow-x: hidden; font-family: 'IBM Plex Sans', system-ui, sans-serif; background:#FDFBF7; color:#0F172A; }
      h1, h2, h3, h4, .font-display { font-family: 'Cabinet Grotesk', 'IBM Plex Sans', sans-serif; }
    </style>
</head>
<body>
    <div id="header-slot"></div>

    <div data-testid="admissions-page">
        <section class="border-b border-slate-200 bg-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-12 sm:py-16 md:py-24">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-saffron">Admissions 2026-27</span>
                <h1 class="mt-3 font-display font-bold text-ink text-3xl sm:text-4xl md:text-5xl lg:text-6xl tracking-tight max-w-3xl">Begin your journey at Azad.</h1>
                <p class="mt-5 text-ash max-w-2xl text-base sm:text-lg">Complete the application form below. Our admissions office will contact you to schedule an interaction.</p>
            </div>
        </section>

        <section class="py-12 sm:py-12 sm:py-16 md:py-24">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                <!-- Stepper -->
                <div id="stepper" class="flex items-center gap-2 mb-10"></div>

                <div id="successBox" class="hidden text-center py-16" data-testid="admission-success">
                    <h1 class="font-display font-bold text-3xl md:text-4xl text-ink">Application received!</h1>
                    <p id="successMsg" class="mt-3 text-ash">Thank you for applying. Our team will reach out within 3-5 working days.</p>
                    <button onclick="resetForm()" class="mt-8 inline-flex items-center gap-2 px-6 py-3 text-sm font-medium text-white bg-ink rounded-full hover:bg-ink2" data-testid="admission-new-btn">Submit another application</button>
                </div>

                <div id="formBox" class="bg-white border border-slate-200 rounded-2xl p-6 md:p-10">
                    <!-- STEP 1 -->
                    <div id="step1" class="space-y-5" data-testid="admission-step-1">
                        <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Student's Full Name <span class="text-saffron">*</span></span>
                            <input id="student_name" data-testid="input-student-name" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none" placeholder="e.g. Aarav Sharma">
                        </label>
                        <div class="grid md:grid-cols-2 gap-5">
                            <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Date of Birth <span class="text-saffron">*</span></span>
                                <input id="date_of_birth" data-testid="input-dob" type="date" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                            </label>
                            <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Gender <span class="text-saffron">*</span></span>
                                <select id="gender" data-testid="input-gender" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                                    <option value="">Select</option><option>Male</option><option>Female</option><option>Other</option>
                                </select>
                            </label>
                        </div>
                        <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Class Applying For <span class="text-saffron">*</span></span>
                            <select id="class_applying" data-testid="input-class" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                                <option value="">Select class</option>
                            </select>
                        </label>
                        <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Previous School (if any)</span>
                            <input id="previous_school" data-testid="input-prev-school" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                        </label>
                        <div class="flex justify-end pt-4">
                            <button onclick="next(1)" data-testid="step-1-next" class="inline-flex items-center gap-2 px-6 py-3 text-sm font-semibold text-white bg-ink rounded-full hover:bg-ink2">Next →</button>
                        </div>
                    </div>

                    <!-- STEP 2 -->
                    <div id="step2" class="space-y-5 hidden" data-testid="admission-step-2">
                        <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Parent / Guardian Name <span class="text-saffron">*</span></span>
                            <input id="parent_name" data-testid="input-parent-name" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                        </label>
                        <div class="grid md:grid-cols-2 gap-5">
                            <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Phone <span class="text-saffron">*</span></span>
                                <input id="parent_phone" data-testid="input-parent-phone" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none" placeholder="+91 ...">
                            </label>
                            <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Email <span class="text-saffron">*</span></span>
                                <input id="parent_email" data-testid="input-parent-email" type="email" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                            </label>
                        </div>
                        <div class="flex justify-between pt-4">
                            <button onclick="goto(1)" data-testid="step-2-back" class="inline-flex items-center gap-2 px-6 py-3 text-sm font-medium text-ink border border-slate-300 rounded-full hover:bg-slate-100">← Back</button>
                            <button onclick="next(2)" data-testid="step-2-next" class="inline-flex items-center gap-2 px-6 py-3 text-sm font-semibold text-white bg-ink rounded-full hover:bg-ink2">Next →</button>
                        </div>
                    </div>

                    <!-- STEP 3 -->
                    <div id="step3" class="space-y-5 hidden" data-testid="admission-step-3">
                        <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Residential Address <span class="text-saffron">*</span></span>
                            <textarea id="address" data-testid="input-address" rows="3" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none" placeholder="House no, street, city, state, pincode"></textarea>
                        </label>
                        <label class="block"><span class="block text-sm font-medium text-ink mb-1.5">Anything else? (optional)</span>
                            <textarea id="message" data-testid="input-message" rows="4" class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none"></textarea>
                        </label>
                        <div class="flex justify-between pt-4">
                            <button onclick="goto(2)" data-testid="step-3-back" class="inline-flex items-center gap-2 px-6 py-3 text-sm font-medium text-ink border border-slate-300 rounded-full hover:bg-slate-100">← Back</button>
                            <button id="submitBtn" onclick="submitForm()" data-testid="admission-submit-btn" class="inline-flex items-center gap-2 px-7 py-3 text-sm font-semibold text-white bg-saffron rounded-full hover:bg-saffronDark">Submit Application →</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="footer-slot"></div>

    <script src="/js/app.js"></script>
    <script>
        renderLayout("admissions");

        const CLASSES = ["Nursery","LKG","UKG","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
        const classSel = document.getElementById("class_applying");
        CLASSES.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = "Class " + c; classSel.appendChild(o); });

        let step = 1;
        function renderStepper() {
            const labels = ["Student", "Parent", "Address & Submit"];
            document.getElementById("stepper").innerHTML = [1,2,3].map(s => `
                <div class="flex-1">
                  <div class="h-1.5 rounded-full ${step >= s ? "bg-saffron" : "bg-slate-200"}"></div>
                  <div class="mt-2 text-xs font-medium ${step >= s ? "text-ink" : "text-ash"}">Step ${s}: ${labels[s-1]}</div>
                </div>
            `).join("");
        }
        function goto(s) {
            step = s;
            [1,2,3].forEach(i => document.getElementById("step"+i).classList.toggle("hidden", i !== s));
            renderStepper();
        }
        function next(from) {
            if (from === 1) {
                if (!val("student_name") || !val("date_of_birth") || !val("gender") || !val("class_applying")) { toast("Please fill all student details", "error"); return; }
            }
            if (from === 2) {
                if (!val("parent_name") || !val("parent_phone") || !val("parent_email")) { toast("Please fill all parent details", "error"); return; }
            }
            goto(from + 1);
        }
        function val(id) { return document.getElementById(id).value.trim(); }

        async function submitForm() {
            if (!val("address")) { toast("Please provide address", "error"); return; }
            const btn = document.getElementById("submitBtn");
            btn.disabled = true; btn.textContent = "Submitting...";
            const payload = {
                student_name: val("student_name"), date_of_birth: val("date_of_birth"),
                gender: val("gender"), class_applying: val("class_applying"),
                parent_name: val("parent_name"), parent_phone: val("parent_phone"), parent_email: val("parent_email"),
                address: val("address"), previous_school: val("previous_school"), message: val("message"),
            };
            try {
                await apiFetch("/admissions", { method: "POST", body: JSON.stringify(payload) });
                document.getElementById("formBox").classList.add("hidden");
                document.getElementById("stepper").classList.add("hidden");
                document.getElementById("successBox").classList.remove("hidden");
                document.getElementById("successMsg").innerHTML = `Thank you for applying. Our team will reach out within 3-5 working days at <strong>${payload.parent_email}</strong>.`;
                toast("Application submitted successfully", "success");
            } catch (e) {
                toast(e.message, "error");
                btn.disabled = false; btn.textContent = "Submit Application →";
            }
        }
        function resetForm() {
            ["student_name","date_of_birth","gender","class_applying","parent_name","parent_phone","parent_email","address","previous_school","message"].forEach(id => document.getElementById(id).value = "");
            document.getElementById("successBox").classList.add("hidden");
            document.getElementById("formBox").classList.remove("hidden");
            document.getElementById("stepper").classList.remove("hidden");
            const btn = document.getElementById("submitBtn"); btn.disabled = false; btn.textContent = "Submit Application →";
            goto(1);
        }
        renderStepper();
    </script>
</body>
</html>
