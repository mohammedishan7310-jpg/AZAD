<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check Attendance — Azad Sr. Sec. School</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ['"IBM Plex Sans"','sans-serif'], display: ['"Cabinet Grotesk"','sans-serif'] }, colors: { ink:'#0F172A', ink2:'#1E293B', ash:'#475569', cream:'#FDFBF7', saffron:'#EA580C', saffronDark:'#C2410C' } } } }
    </script>
    <style>html { overflow-x: hidden; } body { overflow-x: hidden; font-family: 'IBM Plex Sans', sans-serif; background:#FDFBF7; color:#0F172A; } h1,h2,h3,h4,.font-display { font-family: 'Cabinet Grotesk', sans-serif; }</style>
</head>
<body>
    <div id="header-slot"></div>

    <div data-testid="attendance-page">
        <section class="border-b border-slate-200 bg-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-14 md:py-20">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-saffron">Attendance</span>
                <h1 class="mt-3 font-display font-bold text-ink text-2xl sm:text-3xl md:text-4xl lg:text-5xl tracking-tight max-w-3xl">Check your attendance</h1>
                <p class="mt-4 text-ash max-w-2xl">Apna roll number aur class enter karein. Monthly attendance records dikhenge.</p>
            </div>
        </section>

        <section class="py-10 sm:py-12 md:py-16">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <form onsubmit="lookup(event)" class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8" data-testid="attendance-form">
                    <div class="grid sm:grid-cols-2 gap-5">
                        <label class="block">
                            <span class="block text-sm font-medium text-ink mb-1.5">Roll Number <span class="text-saffron">*</span></span>
                            <input id="a_roll" data-testid="attendance-roll" required class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                        </label>
                        <label class="block">
                            <span class="block text-sm font-medium text-ink mb-1.5">Class <span class="text-saffron">*</span></span>
                            <select id="a_class" data-testid="attendance-class" required class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                                <option value="">Select class</option>
                            </select>
                        </label>
                    </div>
                    <button id="a_btn" type="submit" data-testid="attendance-submit" class="mt-6 inline-flex items-center gap-2 px-7 py-3 text-sm font-semibold text-white bg-saffron rounded-full hover:bg-saffronDark disabled:opacity-60">View Attendance →</button>
                </form>

                <div id="attendanceArea" class="mt-8"></div>
            </div>
        </section>
    </div>

    <div id="footer-slot"></div>

    <script src="/js/app.js"></script>
    <script>
        renderLayout("attendance");
        const CLASSES = ["Nursery","LKG","UKG","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
        const sel = document.getElementById("a_class");
        CLASSES.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = "Class " + c; sel.appendChild(o); });

        async function lookup(e) {
            e.preventDefault();
            const roll = document.getElementById("a_roll").value.trim();
            const cls = document.getElementById("a_class").value;
            if (!roll || !cls) { toast("Roll number aur class required", "error"); return; }
            const btn = document.getElementById("a_btn"); btn.disabled = true; btn.textContent = "Loading...";
            const area = document.getElementById("attendanceArea");
            try {
                const items = await apiFetch("/attendance/lookup", { method: "POST", body: JSON.stringify({ roll_number: roll, student_class: cls }) });
                if (!items.length) {
                    area.innerHTML = '<div data-testid="attendance-empty" class="bg-white border border-slate-200 rounded-2xl p-10 text-center"><h3 class="font-display font-bold text-xl text-ink">No attendance record found</h3><p class="mt-2 text-ash">Roll number ya class check karein.</p></div>';
                    return;
                }
                const totalPresent = items.reduce((sum, x) => sum + x.present_days, 0);
                const totalDays = items.reduce((sum, x) => sum + x.total_days, 0);
                const overallPct = totalDays > 0 ? Math.round((totalPresent / totalDays) * 100 * 100) / 100 : 0;
                const student = items[0];
                area.innerHTML = `
                <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden" data-testid="attendance-card">
                  <div class="bg-ink text-white p-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                    <div>
                      <div class="text-xs uppercase tracking-[0.18em] text-saffron">Attendance Summary</div>
                      <h2 class="font-display font-bold text-2xl mt-1">${escapeHtml(student.student_name)}</h2>
                      <div class="text-sm text-cream/80 mt-1">Roll: <b>${escapeHtml(student.roll_number)}</b> &nbsp;•&nbsp; Class: <b>${escapeHtml(student.student_class)}</b></div>
                    </div>
                    <div class="text-center">
                      <div class="font-display text-4xl font-bold ${overallPct>=75?"text-saffron":"text-red-400"}">${overallPct}%</div>
                      <div class="text-[10px] uppercase tracking-wider text-cream/70">Overall (${totalPresent}/${totalDays} days)</div>
                    </div>
                  </div>
                  <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                      <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                          <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Month</th>
                          <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider">Total Days</th>
                          <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider">Present</th>
                          <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider">Absent</th>
                          <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider">%</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${items.map(r => `
                          <tr class="border-b border-slate-100" data-testid="attendance-row-${r.id}">
                            <td class="px-4 py-3 font-medium">${escapeHtml(r.month)}</td>
                            <td class="px-4 py-3 text-right">${r.total_days}</td>
                            <td class="px-4 py-3 text-right text-green-700 font-semibold">${r.present_days}</td>
                            <td class="px-4 py-3 text-right text-red-600">${r.absent_days}</td>
                            <td class="px-4 py-3 text-right font-semibold ${r.percentage>=75?"text-green-700":"text-red-600"}">${r.percentage}%</td>
                          </tr>`).join("")}
                      </tbody>
                    </table>
                  </div>
                </div>`;
            } catch (er) {
                toast(er.message, "error");
            } finally { btn.disabled = false; btn.textContent = "View Attendance →"; }
        }
        function escapeHtml(s) { return String(s||"").replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[ch]); }
    </script>
</body>
</html>
