<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login — Azad Sr. Sec. School</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ['"IBM Plex Sans"','sans-serif'], display: ['"Cabinet Grotesk"','sans-serif'] }, colors: { ink:'#0F172A', ink2:'#1E293B', ash:'#475569', cream:'#FDFBF7', saffron:'#EA580C', saffronDark:'#C2410C' } } } }
    </script>
    <style>html { overflow-x: hidden; } body { overflow-x: hidden; font-family: 'IBM Plex Sans', sans-serif; background:#FDFBF7; color:#0F172A; } h1,h2,h3,h4,.font-display { font-family: 'Cabinet Grotesk', sans-serif; } .grain-bg { background-image: radial-gradient(rgba(15,23,42,.03) 1px, transparent 1px); background-size: 16px 16px; }</style>
</head>
<body class="grain-bg">
    <div class="min-h-screen flex items-center justify-center px-4" data-testid="admin-login-page">
        <div class="w-full max-w-md">
            <a href="/" class="flex items-center gap-2.5 justify-center mb-8">
                <div class="h-10 w-10 rounded-xl bg-ink flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EA580C" stroke-width="2.2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
                <div class="leading-tight">
                    <div class="font-display font-bold text-ink text-base">Azad Sr. Sec. School</div>
                    <div class="text-[11px] uppercase tracking-[0.18em] text-ash">Admin Portal</div>
                </div>
            </a>
            <form onsubmit="doLogin(event)" class="bg-white border border-slate-200 rounded-2xl p-8 space-y-5" data-testid="admin-login-form">
                <span class="text-xs font-bold uppercase tracking-wider text-saffron">Sign in</span>
                <h1 class="font-display font-bold text-2xl text-ink">Welcome back, Admin</h1>
                <label class="block">
                    <span class="block text-sm font-medium text-ink mb-1.5">Email</span>
                    <input id="login_email" data-testid="admin-login-email" type="email" required class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none" placeholder="admin@azadschool.edu">
                </label>
                <label class="block">
                    <span class="block text-sm font-medium text-ink mb-1.5">Password</span>
                    <input id="login_password" data-testid="admin-login-password" type="password" required class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                </label>
                <button id="loginBtn" type="submit" data-testid="admin-login-submit" class="w-full inline-flex items-center justify-center px-6 py-3 text-sm font-semibold text-white bg-ink rounded-full hover:bg-ink2 disabled:opacity-60">Sign in</button>
            </form>
        </div>
    </div>
    <script src="/js/app.js"></script>
    <script>
        // If already logged in, redirect
        getCurrentUser().then(u => { if (u) window.location.href = "/admin.html"; });

        async function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById("login_email").value.trim();
    const password = document.getElementById("login_password").value;
    const btn = document.getElementById("loginBtn");

    btn.disabled = true;
    btn.textContent = "Signing in...";

    try {
        const user = await apiFetch("/auth/login", {
            method: "POST",
            body: JSON.stringify({ email, password })
        });

        localStorage.setItem("access_token", user.token);

        toast("Welcome back", "success");
        window.location.href = "/admin.html";

    } catch (er) {
        toast(er.message || "Login failed", "error");
        btn.disabled = false;
        btn.textContent = "Sign in";
    }
}
    </script>
</body>
</html>
