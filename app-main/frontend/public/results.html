<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check Results — Azad Sr. Sec. School</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ['"IBM Plex Sans"','sans-serif'], display: ['"Cabinet Grotesk"','sans-serif'] }, colors: { ink:'#0F172A', ink2:'#1E293B', ash:'#475569', cream:'#FDFBF7', saffron:'#EA580C', saffronDark:'#C2410C' } } } }
    </script>
    <style>html { overflow-x: hidden; } body { overflow-x: hidden; font-family: 'IBM Plex Sans', sans-serif; background:#FDFBF7; color:#0F172A; } h1,h2,h3,h4,.font-display { font-family: 'Cabinet Grotesk', sans-serif; } @media print { .no-print { display: none !important; } body { background: white; } }</style>
</head>
<body>
    <div id="header-slot" class="no-print"></div>

    <div data-testid="results-page">
        <section class="border-b border-slate-200 bg-white no-print">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-14 md:py-20">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-saffron">Examination Results</span>
                <h1 class="mt-3 font-display font-bold text-ink text-2xl sm:text-3xl md:text-4xl lg:text-5xl tracking-tight max-w-3xl">Check your result</h1>
                <p class="mt-4 text-ash max-w-2xl">Apna roll number aur class enter karein. Saari published results turant dikhengi.</p>
            </div>
        </section>

        <section class="py-10 sm:py-12 md:py-16">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <form onsubmit="lookup(event)" class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 no-print" data-testid="results-form">
                    <div class="grid sm:grid-cols-2 gap-5">
                        <label class="block">
                            <span class="block text-sm font-medium text-ink mb-1.5">Roll Number <span class="text-saffron">*</span></span>
                            <input id="r_roll" data-testid="results-roll" required class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none" placeholder="e.g. 1042">
                        </label>
                        <label class="block">
                            <span class="block text-sm font-medium text-ink mb-1.5">Class <span class="text-saffron">*</span></span>
                            <select id="r_class" data-testid="results-class" required class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-cream focus:border-saffron outline-none">
                                <option value="">Select class</option>
                            </select>
                        </label>
                    </div>
                    <button id="r_btn" type="submit" data-testid="results-submit" class="mt-6 inline-flex items-center gap-2 px-7 py-3 text-sm font-semibold text-white bg-saffron rounded-full hover:bg-saffronDark disabled:opacity-60">View Result →</button>
                </form>

                <div id="resultsArea" class="mt-8 space-y-6"></div>
            </div>
        </section>
    </div>

    <div id="footer-slot" class="no-print"></div>

    <script src="/js/app.js"></script>
    <script>
        renderLayout("results");
        const CLASSES = ["Nursery","LKG","UKG","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
        const sel = document.getElementById("r_class");
        CLASSES.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = "Class " + c; sel.appendChild(o); });

        async function lookup(e) {
            e.preventDefault();
            const roll = document.getElementById("r_roll").value.trim();
            const cls = document.getElementById("r_class").value;
            if (!roll || !cls) { toast("Roll number aur class required", "error"); return; }
            const btn = document.getElementById("r_btn"); btn.disabled = true; btn.textContent = "Loading...";
            const area = document.getElementById("resultsArea");
            try {
                const items = await apiFetch("/results/lookup", { method: "POST", body: JSON.stringify({ roll_number: roll, student_class: cls }) });
                if (!items.length) {
                    area.innerHTML = '<div data-testid="results-empty" class="bg-white border border-slate-200 rounded-2xl p-10 text-center"><h3 class="font-display font-bold text-xl text-ink">No result found</h3><p class="mt-2 text-ash">Roll number ya class check karein, ya apne school admin se contact karein.</p></div>';
                    return;
                }
                area.innerHTML = items.map(r => renderResultCard(r)).join("");
            } catch (er) {
                toast(er.message, "error");
            } finally { btn.disabled = false; btn.textContent = "View Result →"; }
        }

        function renderResultCard(r) {
            const pass = r.percentage >= 33;
            return `
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden" data-testid="result-card-${r.id}">
              <div class="bg-ink text-white p-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <div>
                  <div class="text-xs uppercase tracking-[0.18em] text-saffron">${escapeHtml(r.exam_name)}</div>
                  <h2 class="font-display font-bold text-2xl mt-1">${escapeHtml(r.student_name)}</h2>
                  <div class="text-sm text-cream/80 mt-1">Roll No: <b>${escapeHtml(r.roll_number)}</b> &nbsp;•&nbsp; Class: <b>${escapeHtml(r.student_class)}</b></div>
                </div>
                <div class="flex items-center gap-4">
                  <div class="text-center">
                    <div class="font-display text-3xl font-bold text-saffron">${r.grade}</div>
                    <div class="text-[10px] uppercase tracking-wider text-cream/70">Grade</div>
                  </div>
                  <div class="text-center">
                    <div class="font-display text-3xl font-bold ${pass?"text-white":"text-red-400"}">${r.percentage}%</div>
                    <div class="text-[10px] uppercase tracking-wider text-cream/70">${pass?"Passed":"Failed"}</div>
                  </div>
                </div>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                      <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Subject</th>
                      <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider">Max Marks</th>
                      <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider">Marks Obtained</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${r.subjects.map(s => `<tr class="border-b border-slate-100"><td class="px-4 py-3">${escapeHtml(s.name)}</td><td class="px-4 py-3 text-right">${s.max_marks}</td><td class="px-4 py-3 text-right font-semibold">${s.marks_obtained}</td></tr>`).join("")}
                    <tr class="bg-slate-50 font-semibold"><td class="px-4 py-3">Total</td><td class="px-4 py-3 text-right">${r.total_max}</td><td class="px-4 py-3 text-right">${r.total_obtained}</td></tr>
                  </tbody>
                </table>
              </div>
              ${r.remarks ? `<div class="px-6 py-4 border-t border-slate-200 text-sm"><span class="text-ash">Remarks: </span>${escapeHtml(r.remarks)}</div>` : ""}
              <div class="px-6 py-4 border-t border-slate-200 flex justify-between items-center no-print">
                <div class="text-xs text-ash">Published: ${new Date(r.created_at).toLocaleDateString("en-IN", {day:"numeric", month:"short", year:"numeric"})}</div>
                <button onclick="window.print()" class="text-xs font-semibold text-ink hover:text-saffron">🖨 Print / Save PDF</button>
              </div>
            </div>`;
        }
        function escapeHtml(s) { return String(s||"").replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[ch]); }
    </script>
</body>
</html>
